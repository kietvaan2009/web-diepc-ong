<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chu Diệp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

.container{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

.card{
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    background:rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px rgba(0,255,255,0.5);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

/* popup */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e1e1e;
    width:90%;
    max-width:700px;
    border-radius:20px;
    overflow:hidden;
}

.modal-box img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.modal-content{
    padding:20px;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:25px;
    cursor:pointer;
}
</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px;">✨ Chu Diệp ✨</h1>

<div class="container">

<div class="card" onclick="openModal('intro')">
<img src="https://i.postimg.cc/k5j7p0Lr/0f935e8d-0820-4125-963c-85ba38a1a206.jpg">
<h3>Giới thiệu</h3>
</div>

<div class="card" onclick="openModal('hobby')">
<img src="https://i.postimg.cc/zXm86S2g/8c2e7d5b-e36e-423b-83a2-ba72940ba325.jpg">
<h3>Sở thích</h3>
</div>

<div class="card" onclick="openModal('dream')">
<img src="https://i.postimg.cc/d1Sg2vpd/64fa8243-1c66-4514-81b0-48e93417ba35.jpg">
<h3>Ước mơ</h3>
</div>

<div class="card" onclick="openModal('family')">
<img src="https://i.postimg.cc/jwwD5xNb/IMG-20260413-WA0000.jpg">
<h3>Gia đình</h3>
</div>

<div class="card" onclick="openModal('friend')">
<img src="https://i.postimg.cc/LJx53Y3K/IMG-20260413-WA0001.jpg">
<h3>Bạn bè</h3>
</div>

<div class="card" onclick="openModal('religion')">
<img src="https://i.postimg.cc/HkZKDTsC/d0a5f4f6-9e93-46ec-80c6-7a12ee3fd1d7.jpg">
<h3>Công giáo</h3>
</div>

</div>

<!-- modal -->
<div id="modal" class="modal" onclick="closeModal()">
<span class="close" onclick="closeModal()">✖</span>

<div class="modal-box" onclick="event.stopPropagation()">
<img id="modalImg">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
</div>
</div>
</div>

<script>
function openModal(type){

let data = {
intro:{
img:"https://i.postimg.cc/k5j7p0Lr/0f935e8d-0820-4125-963c-85ba38a1a206.jpg",
title:"Giới thiệu",
text:"Mình là Chu Diệp..."
},
hobby:{
img:"https://i.postimg.cc/zXm86S2g/8c2e7d5b-e36e-423b-83a2-ba72940ba325.jpg",
title:"Sở thích",
text:"Mình thích nghe nhạc..."
},
dream:{
img:"https://i.postimg.cc/d1Sg2vpd/64fa8243-1c66-4514-81b0-48e93417ba35.jpg",
title:"Ước mơ",
text:"Mình muốn theo ngành du lịch..."
},
family:{
img:"https://i.postimg.cc/jwwD5xNb/IMG-20260413-WA0000.jpg",
title:"Gia đình",
text:"Gia đình mình gồm 5 người..."
},
friend:{
img:"https://i.postimg.cc/LJx53Y3K/IMG-20260413-WA0001.jpg",
title:"Bạn bè",
text:"Bạn bè luôn giúp đỡ nhau..."
},
religion:{
img:"https://i.postimg.cc/HkZKDTsC/d0a5f4f6-9e93-46ec-80c6-7a12ee3fd1d7.jpg",
title:"Công giáo",
text:"Mình là người Công giáo..."
}
};

document.getElementById("modalImg").src=data[type].img;
document.getElementById("modalTitle").innerText=data[type].title;
document.getElementById("modalText").innerText=data[type].text;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
