<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chu Diệp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    font-family:'Poppins',sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color:white;
}

/* GRID */
.container{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:25px;
}

/* CARD */
.card{
    border-radius:20px;
    overflow:hidden;
    cursor:pointer;
    transition:0.4s;
    backdrop-filter:blur(10px);
    background:rgba(255,255,255,0.08);
}

.card:hover{
    transform:translateY(-10px) scale(1.05);
    box-shadow:0 0 30px rgba(0,255,255,0.5);
}

.card img{
    width:100%;
    height:200px;
    object-fit:cover;
}

.card h3{
    padding:15px;
}

/* POPUP XỊN */
.modal{
    display:none;
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
}

.modal-box{
    background:#1e1e1e;
    width:90%;
    max-width:700px;
    border-radius:20px;
    overflow:hidden;
    animation:zoom 0.3s ease;
}

.modal-box img{
    width:100%;
    height:250px;
    object-fit:cover;
}

.modal-content{
    padding:20px;
}

.modal-content h2{
    margin-bottom:10px;
}

.modal-content p{
    line-height:1.7;
    color:#ddd;
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    font-size:25px;
    cursor:pointer;
}

@keyframes zoom{
    from{transform:scale(0.8);opacity:0;}
    to{transform:scale(1);opacity:1;}
}
</style>
</head>

<body>

<h1 style="text-align:center;margin-top:20px;">✨ Chu Diệp ✨</h1>

<div class="container">

<div class="card" onclick="openModal('intro')">
<img src="https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg">
<h3>Giới thiệu</h3>
</div>

<div class="card" onclick="openModal('hobby')">
<img src="https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg">
<h3>Sở thích</h3>
</div>

<div class="card" onclick="openModal('dream')">
<img src="https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg">
<h3>Ước mơ</h3>
</div>

<div class="card" onclick="openModal('family')">
<img src="https://i.postimg.cc/jwwD5xNb/IMG-20260413-WA0000.jpg">
<h3>Gia đình</h3>
</div>

<div class="card" onclick="openModal('friend')">
<img src="https://i.postimg.cc/LJx53Y3K/IMG-20260413-WA0001.jpg">
<h3>Bạn bè</h3>
</div>

<div class="card" onclick="openModal('religion')">
<img src="https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg">
<h3>Công giáo</h3>
</div>

</div>

<!-- MODAL -->
<div id="modal" class="modal" onclick="closeModal()">
<span class="close" onclick="closeModal()">✖</span>

<div class="modal-box" onclick="event.stopPropagation()">
<img id="modalImg">
<div class="modal-content">
<h2 id="modalTitle"></h2>
<p id="modalText"></p>
</div>
</div>
</div>

<script>
function openModal(type){

let data = {
intro:{
img:"https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg",
title:"Giới thiệu",
text:`Mình là Chu Diệp, hiện đang là học sinh cuối cấp. Đây là giai đoạn quan trọng trong cuộc đời học sinh nên mình luôn cố gắng từng ngày để đạt được kết quả tốt nhất trong kỳ thi tốt nghiệp. 

Mình tin rằng mỗi sự nỗ lực nhỏ hôm nay sẽ tạo nên thành công lớn trong tương lai. Vì vậy, dù có khó khăn mình vẫn luôn cố gắng không bỏ cuộc và tiếp tục tiến về phía trước.`
},

hobby:{
img:"https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg",
title:"Sở thích",
text:`Mình rất thích nghe nhạc vì nó giúp mình thư giãn sau những giờ học căng thẳng. Ngoài ra, mình còn thích khám phá những địa điểm đẹp trên khắp đất nước Việt Nam.

Đối với mình, mỗi chuyến đi không chỉ là để ngắm cảnh mà còn là cơ hội để học hỏi, trải nghiệm và hiểu thêm về cuộc sống xung quanh.`
},

dream:{
img:"https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg",
title:"Ước mơ",
text:`Ước mơ của mình là theo học ngành du lịch và lữ hành. Mình mong muốn được đặt chân đến nhiều vùng đất khác nhau, khám phá những nền văn hoá mới và mở rộng hiểu biết của bản thân.

Đối với mình, việc được đi và trải nghiệm chính là cách tuyệt vời nhất để trưởng thành và phát triển.`
},

family:{
img:"https://i.postimg.cc/jwwD5xNb/IMG-20260413-WA0000.jpg",
title:"Gia đình",
text:`Gia đình mình gồm 5 thành viên và ai cũng rất thân thiện, hoà đồng. Bố mẹ mình tuy làm công nhân nhưng luôn lạc quan và hết lòng vì gia đình.

Anh trai mình hiện đang học đại học và em nhỏ thì khá nhút nhát, nhưng tất cả mọi người luôn yêu thương và quan tâm lẫn nhau. Gia đình chính là động lực lớn nhất giúp mình cố gắng mỗi ngày.`
},

friend:{
img:"https://i.postimg.cc/LJx53Y3K/IMG-20260413-WA0001.jpg",
title:"Bạn bè",
text:`Nhóm bạn của mình tuy không cùng tuổi nhưng luôn tôn trọng và giúp đỡ nhau. Mỗi khi có ai gặp khó khăn thì mọi người đều sẵn sàng hỗ trợ mà không tính toán.

Chính sự chân thành đó đã giúp tình bạn của chúng mình trở nên bền chặt và đáng quý hơn bao giờ hết.`
},

religion:{
img:"https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg",
title:"Công giáo",
text:`Mình là người Công giáo và luôn coi đức tin là một phần quan trọng trong cuộc sống. Mình cố gắng sống tích cực, yêu thương và tôn trọng mọi người xung quanh.

Dù có những lời không hay, mình tin rằng hành động và cách sống của bản thân sẽ là minh chứng rõ ràng nhất cho con người mình.`
}
};

document.getElementById("modalImg").src=data[type].img;
document.getElementById("modalTitle").innerText=data[type].title;
document.getElementById("modalText").innerText=data[type].text;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
