<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chu Diệp</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

* {margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    text-align: center;
}

h1 {
    margin: 30px 0;
    font-size: 32px;
}

.container {width: 90%;margin: auto;}

.row {
    display: flex;
    justify-content: center;
    gap: 25px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.card {
    width: 260px;
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-radius: 20px;
    padding: 15px;
    transition: 0.4s;
}

.card:hover {
    transform: translateY(-10px) scale(1.03);
    box-shadow: 0 0 25px rgba(0,255,255,0.3);
}

.card img {
    width: 100%;
    border-radius: 12px;
}

.title {
    margin-top: 10px;
    font-size: 18px;
    font-weight: 600;
}

.desc {
    font-size: 14px;
    color: #ccc;
}
</style>
</head>

<body>

<h1>✨ Chu Diệp ✨</h1>

<div class="container">

<div class="row">
<div class="card">
<img src="https://via.placeholder.com/300">
<div class="title">Giới thiệu</div>
<div class="desc">Học sinh cuối cấp, đang cố gắng từng ngày.</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<div class="title">Sở thích</div>
<div class="desc">Nghe nhạc và khám phá Việt Nam.</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<div class="title">Ước mơ</div>
<div class="desc">Học du lịch để đi nhiều nơi.</div>
</div>
</div>

<div class="row">
<div class="card">
<img src="https://via.placeholder.com/300">
<div class="title">Gia đình</div>
<div class="desc">Gia đình 5 người luôn yêu thương nhau.</div>
</div>

<div class="card">
<img src="https://via.placeholder.com/300">
<div class="title">Bạn bè</div>
<div class="desc">Bạn bè thân thiết và luôn giúp đỡ nhau.</div>
</div>
</div>

</div>

</body>
</html>
