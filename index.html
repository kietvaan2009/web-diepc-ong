<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chu Diệp</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    color: white;
    text-align: center;
    overflow-x: hidden;
}

/* background animation */
body::before {
    content:"";
    position:fixed;
    width:200%;
    height:200%;
    background: radial-gradient(circle, rgba(0,255,255,0.1), transparent);
    animation: moveBg 10s linear infinite;
    z-index:-1;
}

@keyframes moveBg {
    0% {transform:translate(0,0);}
    50% {transform:translate(-25%,-25%);}
    100% {transform:translate(0,0);}
}

h1 {
    margin: 30px 0;
    font-size: 32px;
    animation: fadeDown 1s ease;
}

/* GRID */
.container {
    width: 90%;
    margin: auto;
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.08);
    border-radius: 20px;
    overflow: hidden;
    cursor: pointer;
    transition: 0.4s;
    backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.1);
    animation: fadeUp 1s ease;
}

.card:hover {
    transform: translateY(-10px) scale(1.05);
    box-shadow: 0 0 30px rgba(0,255,255,0.5);
}

/* image */
.card img {
    width: 100%;
    height: 200px;
    object-fit: cover;
}

/* text */
.card p {
    padding: 15px;
    font-weight: 600;
    font-size: 16px;
}

/* popup */
.modal {
    display: none;
    position: fixed;
    top:0;left:0;
    width:100%;height:100%;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
}

.modal-content {
    background: #1e1e1e;
    padding: 30px;
    border-radius: 20px;
    width: 85%;
    max-width: 600px;
    text-align: left;
    line-height: 1.7;
    animation: zoom 0.3s ease;
}

@keyframes zoom {
    from {transform: scale(0.8); opacity:0;}
    to {transform: scale(1); opacity:1;}
}

.close {
    float:right;
    cursor:pointer;
    font-size:22px;
}

/* animation */
@keyframes fadeUp {
    from {opacity:0; transform:translateY(40px);}
    to {opacity:1; transform:translateY(0);}
}

@keyframes fadeDown {
    from {opacity:0; transform:translateY(-40px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>

<body>

<h1>✨ Chu Diệp ✨</h1>

<div class="container">

<div class="card" onclick="openModal('intro')">
<img src="https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg">
<p>Giới thiệu</p>
</div>

<div class="card" onclick="openModal('hobby')">
<img src="https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg">
<p>Sở thích</p>
</div>

<div class="card" onclick="openModal('dream')">
<img src="https://i.postimg.cc/zBpKx3GV/f7865717-421a-44a9-91ca-41b0358d2998.jpg">
<p>Ước mơ</p>
</div>

<div class="card" onclick="openModal('family')">
<img src="https://i.postimg.cc/jwwD5xNb/IMG-20260413-WA0000.jpg">
<p>Gia đình</p>
</div>

<div class="card" onclick="openModal('friend')">
<img src="https://i.postimg.cc/LJx53Y3K/IMG-20260413-WA0001.jpg">
<p>Bạn bè</p>
</div>

<div class="card" onclick="openModal('religion')">
<img src="https://i.postimg.cc/cJS3ZfKH/d4685c9c-d67e-4bef-9abc-1342b089488e.jpg">
<p>Công giáo</p>
</div>

</div>

<div id="modal" class="modal" onclick="closeModal()">
<div class="modal-content" onclick="event.stopPropagation()">
<span class="close" onclick="closeModal()">✖</span>
<p id="text"></p>
</div>
</div>

<script>
function openModal(type){
let text="";

if(type=="intro"){
text="Mình là Chu Diệp, học sinh cuối cấp, đang cố gắng từng ngày để đạt được mục tiêu của mình.";
}
else if(type=="hobby"){
text="Mình thích nghe nhạc và khám phá những vẻ đẹp của Việt Nam.";
}
else if(type=="dream"){
text="Mình muốn theo ngành du lịch để đi nhiều nơi và trải nghiệm cuộc sống.";
}
else if(type=="family"){
text="Gia đình mình gồm 5 người, luôn yêu thương và ủng hộ nhau.";
}
else if(type=="friend"){
text="Bạn bè luôn giúp đỡ nhau và sống rất chân thành.";
}
else if(type=="religion"){
text="Mình là người Công giáo, luôn sống tích cực và tôn trọng mọi người.";
}

document.getElementById("text").innerText=text;
document.getElementById("modal").style.display="flex";
}

function closeModal(){
document.getElementById("modal").style.display="none";
}
</script>

</body>
</html>
